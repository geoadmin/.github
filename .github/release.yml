# .github/release.yml

changelog:
  exclude:
    labels:
      - ignore-for-release
      - skip-changelog
      - skip-rn
      - skip-release-note
      - no-release-note
      - no-rn
      - no-changelog
      - new-release
    authors:
      - terraform-bgdi
  categories:
    - title: Breaking Changes 🛠
      labels:
        - breaking-change
    - title: New Features
      labels:
        - feature
        - enhancement
    - title: Data Integration
      label:
        - data
        - data-integration
    - title: Bug Fixes
      labels:
        - fix
        - bugfix
        - bug
    - title: Other Changes
      labels:
        - "*"
